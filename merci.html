<!DOCTYPE html>

      letter-spacing: -0.01em;

    }

      color: rgba(232, 241, 244, 0.92);
      margin: 0;
      line-height: 1.7;
      font-size: 1.02rem;
    }
    .thanks-actions {
      display: flex;
      flex-wrap: wrap;
